version: "3.9"

services:
  rag-api:
    build: .
    container_name: rag-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      LOG_FORMAT: json
      LOG_LEVEL: INFO
      MILVUS_URI: http://localhost:19530
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # BGE model load + Milvus connection takes ~20-30s on first start
      start_period: 60s
